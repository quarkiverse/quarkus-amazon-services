quarkus.marketplacemetering.endpoint-override=http://localhost:9090

quarkus.marketplacemetering.aws.region=us-east-2
quarkus.marketplacemetering.aws.credentials.type=static
quarkus.marketplacemetering.aws.credentials.static-provider.access-key-id=test-key
quarkus.marketplacemetering.aws.credentials.static-provider.secret-access-key=test-secret

quarkus.marketplacemetering.sync-client.type = url
quarkus.marketplacemetering.sync-client.connection-timeout = 0.100S
quarkus.marketplacemetering.sync-client.socket-timeout = 0.100S
