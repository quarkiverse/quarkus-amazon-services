quarkus.aws.devservices.localstack.init-scripts-classpath=localstack-init
quarkus.aws.devservices.localstack.init-completion-msg=Tests init completed

quarkus.secretsmanager.config.enabled=true
quarkus.secretsmanager.config.secrets."postgres.url"=pgsql/jdbc
quarkus.secretsmanager.config.secrets."postgres.username"=pgsql/user
quarkus.secretsmanager.config.secrets."postgres.password"=pgsql/password
